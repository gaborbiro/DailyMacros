name: Release

on:
  push:
    branches: [ "release" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Ensure CHATGPT_API_KEY is available to Actions
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: |
        if [ -z "$CHATGPT_API_KEY" ]; then
          echo "::error::CHATGPT_API_KEY is empty. Add it under Settings → Secrets and variables → Actions (same name: CHATGPT_API_KEY). Codespaces secrets are not used here."
          exit 1
        fi

    - name: Run unit tests
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew testDebugUnitTest --stacktrace

    # ── Debug APK ──────────────────────────────────────────────
    - name: Build debug APK
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew assembleDebug

    # ── Release AAB (signed) ───────────────────────────────────
    - name: Decode release keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > /tmp/release-keystore.jks

    - name: Build signed release AAB
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
        RELEASE_KEYSTORE_PATH: /tmp/release-keystore.jks
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew bundleRelease

    # ── Collect artifacts ──────────────────────────────────────
    # Tag matches app/build.gradle.kts (appVersionName); Gradle writes app/build/release-version-name.txt
    - name: Collect release artifacts
      run: |
        VERSION=$(cat app/build/release-version-name.txt | tr -d ' \r\n\t')
        if [ -z "$VERSION" ]; then
          echo "Missing app/build/release-version-name.txt (bundleRelease should run writeAppReleaseVersionNameFile)" >&2
          exit 1
        fi
        echo "APP_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        mkdir -p release-artifacts
        cp app/build/outputs/apk/debug/DailyMacros-*.apk release-artifacts/ 2>/dev/null || true
        cp app/build/outputs/bundle/release/DailyMacros-*.aab release-artifacts/ 2>/dev/null || true
        ls -lh release-artifacts/

    # ── GitHub Release ─────────────────────────────────────────

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.APP_VERSION_NAME }}
        name: v${{ env.APP_VERSION_NAME }}
        draft: false
        generate_release_notes: true
        files: release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Google Play Store ──────────────────────────────────────
    - name: Upload to Google Play (internal testing)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: dev.gaborbiro.dailymacros
        releaseFiles: release-artifacts/DailyMacros-*-release.aab
        track: internal
        status: completed
