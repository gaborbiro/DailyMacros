name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew testDebugUnitTest --stacktrace

    # ── Debug APK ──────────────────────────────────────────────
    - name: Build debug APK
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew assembleDebug

    # ── Release AAB (signed) ───────────────────────────────────
    - name: Decode release keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > /tmp/release-keystore.jks

    - name: Build signed release AAB
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
        RELEASE_KEYSTORE_PATH: /tmp/release-keystore.jks
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew bundleRelease

    # ── Collect artifacts ──────────────────────────────────────
    - name: Extract version info
      id: version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
        echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

    - name: Rename artifacts for release
      run: |
        VERSION_NAME="${{ steps.version.outputs.version_name }}"
        VERSION_CODE="${{ steps.version.outputs.version_code }}"
        TAG="${{ steps.version.outputs.tag }}"

        mkdir -p release-artifacts

        cp app/build/outputs/apk/debug/app-debug.apk \
           "release-artifacts/DailyMacros-${TAG}-debug.apk"

        AAB_DIR="app/build/outputs/bundle/release"
        AAB=$(find "$AAB_DIR" -name '*.aab' | head -1)
        if [ -n "$AAB" ]; then
          cp "$AAB" "release-artifacts/DailyMacros-${TAG}-release.aab"
        fi

    # ── GitHub Release ─────────────────────────────────────────
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        generate_release_notes: true
        files: release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Google Play Store ──────────────────────────────────────
    - name: Upload to Google Play (internal testing)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: dev.gaborbiro.dailymacros
        releaseFiles: release-artifacts/DailyMacros-*-release.aab
        track: internal
        status: completed
