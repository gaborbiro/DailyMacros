name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Build minified debug-signed APK
      env:
        CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
      run: ./gradlew assembleMinifiedDebug

    - name: Set short SHA for release tag
      if: github.event_name == 'push'
      run: echo "GIT_SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ env.GIT_SHORT_SHA }}
        name: "Master #${{ github.run_number }} (${{ env.GIT_SHORT_SHA }})"
        generate_release_notes: true
        # assembleMinifiedDebug renames the APK (see app/build.gradle.kts).
        files: app/build/outputs/apk/minifiedDebug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
